name: 向 GitHub Page 部署静态内容

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - ".github/**"
      - "!.github/workflows/deploy.yml"
      - ".action_scripts/**"
      - "!.action_scripts/JavaScript/yaml-json.mts"
      - ".gitignore"
      - "README.md"
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Page
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一次并发部署，跳过正在进行的运行和最新排队的运行之间的排队运行。
# 但是，不要取消正在进行的运行，因为我们希望允许这些生产部署完成。
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 单个部署任务，因为我们只是部署
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 签出
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 设置 Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: latest

      - name: 设置 Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.x

      - name: 安装依赖
        run: |-
          echo "========================= Python / pip ========================="
          python -m pip install --upgrade pip
          pip install -r .action_scripts/Python/requirements.txt
          echo "========================= TS / JS / npm ========================="
          npm ci

      - name: 编译 TypeScript 代码
        shell: bash
        run: |-
          npx tsc .action_scripts/JavaScript/yaml-json.mts --lib "esnext" --types "node" --declaration false --declarationMap false --sourceMap false
          npx tsc --declaration false --declarationMap false --sourceMap false
          python .action_scripts/Python/tsClear.py

      - name: 转换 api 文件
        shell: bash
        # YAML -> JSON
        run: |-
          cd .action_scripts/JavaScript
          cd ../..
          echo ===============
          node .action_scripts/JavaScript/yaml-json.mjs api/json/notifications.yaml
          rm -v api/json/notifications.yaml
          echo ===============
          node .action_scripts/JavaScript/yaml-json.mjs api/json/fzxc.yaml
          rm -v api/json/fzxc.yaml

      - name: 移除不应部署的文件
        shell: bash
        run: |-
          rm -rv .github
          rm -rv .action_scripts
          rm -rv node_modules
          rm -v .gitignore
          rm -v eslint.config.js
          rm -v README.md
          rm -v Tools/chinese_git/notice/Notice.md
          rm -v tsconfig.json
          rm -v package.json
          rm -v package-lock.json
          rm -v serve.json

      - name: 设置页面
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: 上传工件
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          # 上传整个仓库
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
