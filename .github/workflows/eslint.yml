name: Eslint

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  check-url:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: 设置 Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: latest

      - name: 运行 Eslint
        shell: bash
        run: |-
          npm ci
          npm run lint
