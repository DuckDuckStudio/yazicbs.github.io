name: Eslint

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  eslint:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 设置 Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest

      - name: 运行 Eslint
        shell: bash
        run: |-
          npm ci
          npm run lint
