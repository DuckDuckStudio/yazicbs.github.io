name: Eslint

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  eslint:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: 设置 Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: latest

      - name: 运行 Eslint
        shell: bash
        run: |-
          npm ci
          npm run lint
